<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact The Rapids for rafting reservations, general questions, and website suggestions.">
    <meta name="author" content="Romina De Santis Cruz">
    <title>Contact Us | The Rapids</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header class="site-header">
        <img class="logo" src="images/z-therapidssplash.jpg" alt="The Rapids logo">
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main class="contact-page">
        <section class="company-block">
            <h1>Contact Us</h1>
            <h2>The Rapids White Water Rafting</h2>
            <p>123 River Canyon Road</p>
            <p>Boise, Idaho 83702</p>
            <p>+1 (208) 555-1234</p>
            <p><a href="mailto:info@therapids.com">info@therapids.com</a></p>
        </section>

        <section class="contact-top">
            <div class="map-panel">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2887.194807677143!2d-116.20231332351588!3d43.64255657110273!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x54aeffbba38bd8ed%3A0x8eabdb59bd4cb4ce!2sBoise%2C%20ID!5e0!3m2!1sen!2sus!4v1710000000000!5m2!1sen!2sus"
                  title="Map of The Rapids location" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <div class="form-panel">
                <form action="#" method="post">
                    <div class="form-row">
                        <label for="fullname">Name</label>
                        <input type="text" id="fullname" name="fullname" placeholder="Placeholder"
                          required>
                    </div>

                    <div class="form-row">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Placeholder"
                          required>
                    </div>

                    <div class="form-row purpose-row">
                        <p>Message Purpose</p>

                        <label for="general">
                            <input type="radio" id="general" name="purpose" value="general inquiry"
                              checked>
                            General Inquiry
                        </label>

                        <label for="reservation">
                            <input type="radio" id="reservation" name="purpose"
                              value="reservation question">
                            Reservation Question
                        </label>

                        <label for="suggestion">
                            <input type="radio" id="suggestion" name="purpose"
                              value="website suggestion">
                            Website Suggestion
                        </label>
                    </div>

                    <div class="form-row message-row">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="Type here"
                          required></textarea>
                    </div>

                    <div class="form-row newsletter-row">
                        <label for="subscribe" class="checkbox-label">
                            <input type="checkbox" id="subscribe" name="subscribe">
                            Please Subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </section>

        <section class="employees-panel">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-grid">
                <figure>
                    <img src="images/Sofia-Martinez.jpg"
                      alt="Sofia Martinez - Reservations Manager">
                    <figcaption>Sofia Martinez - Reservations Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/Daniel-Cruz.jpg" alt="Daniel Cruz - Lead River Guide">
                    <figcaption>Daniel Cruz - Lead River Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/Emma-Johnson.jpg"
                      alt="Emma Johnson - Customer Support Specialist">
                    <figcaption>Emma Johnson - Customer Support Specialist</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>© 2026 The Rapids | Romina De Santis Cruz</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram">
            </a>
            <a href="https://twitter.com">
                <img src="images/twitter.svg" alt="Twitter">
            </a>
        </nav>
    </footer>
</body>

</html>
